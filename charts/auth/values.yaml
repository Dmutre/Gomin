nameOverride: ""
fullnameOverride: ""

image:
  repository: gomin/auth
  # tag defaults to Chart.appVersion when left empty
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

imagePullSecrets: []

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

service:
  type: ClusterIP
  port: 5000  # gRPC

migrations:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 400m
    memory: 384Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

# Inject environment variables directly (non-sensitive).
# Sensitive values (DB passwords, JWT secrets) should come via envFrom referencing a Secret.
env: {}
  # NODE_ENV: production
  # GRPC_PORT: "5000"
  # HOST: "0.0.0.0"

# Reference existing ConfigMaps or Secrets for environment variables.
envFrom:
  - secretRef:
      name: auth-secret
