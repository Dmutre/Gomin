{{- if and .Values.migrations.enabled .Values.seedSecrets.gatewayServiceSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auth.fullname" . }}-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
type: Opaque
stringData:
  SERVICE_IDENTITY_GATEWAY_SERVICE_SECRET: {{ .Values.seedSecrets.gatewayServiceSecret | quote }}
  SERVICE_IDENTITY_COMMUNICATION_SERVICE_SECRET: {{ .Values.seedSecrets.communicationServiceSecret | quote }}
  SERVICE_IDENTITY_AUTH_SERVICE_SECRET: {{ .Values.seedSecrets.authServiceSecret | quote }}
{{- end }}
