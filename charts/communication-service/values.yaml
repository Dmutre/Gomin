nameOverride: ""
fullnameOverride: ""

image:
  repository: gomin/communication-service
  tag: ""
  pullPolicy: Always

replicaCount: 1

imagePullSecrets: []

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

service:
  type: ClusterIP
  port: 5001

migrations:
  enabled: true

resources:
  requests:
    cpu: 300m
    memory: 256Mi
  limits:
    cpu: 600m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

env: {}

envFrom:
  - secretRef:
      name: communication-service-secret
