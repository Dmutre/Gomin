kube-prometheus-stack:
  alertmanager:
    enabled: false

  # Managed cluster — no access to kube-system components
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
  coreDns:
    enabled: false

  prometheus:
    prometheusSpec:
      retention: 7d
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      enableRemoteWriteReceiver: true

  grafana:
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1

    initChownData:
      enabled: false
    securityContext:
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472

    persistence:
      enabled: true
      size: 2Gi

    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - grafana.84.247.133.45.nip.io # Replace with your external IP
      path: /
      pathType: Prefix

    additionalDataSources:
      - name: Loki
        type: loki
        url: http://monitoring-loki:3100
        access: proxy
        isDefault: false
      - name: Tempo
        type: tempo
        url: http://monitoring-tempo:3200
        access: proxy
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          lokiSearch:
            datasourceUid: loki

loki:
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi
  # Disable microservice-mode components
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false
  test:
    enabled: false
  lokiCanary:
    enabled: false

tempo:
  tempo:
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    metricsGenerator:
      enabled: true
      remoteWriteUrl: "http://monitoring-kube-prometheus-prometheus:9090/api/v1/write"
    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
            - local-blocks
  persistence:
    enabled: true
    size: 10Gi

opentelemetry-collector:
  mode: deployment
  replicaCount: 1
  image:
    repository: otel/opentelemetry-collector-contrib

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
      batch:
        timeout: 1s
        send_batch_size: 1024

    exporters:
      otlp/tempo:
        endpoint: monitoring-tempo:4317
        tls:
          insecure: true
      otlphttp/loki:
        endpoint: http://monitoring-loki:3100/otlp
        tls:
          insecure: true
      prometheus:
        endpoint: "0.0.0.0:8889"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/loki]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]

  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    prometheus:
      enabled: true
      containerPort: 8889
      servicePort: 8889
      protocol: TCP

  serviceMonitor:
    enabled: true
    metricsEndpoints:
      - port: prometheus
        interval: 30s
