name: Run DB migration
description: Creates a Kubernetes Job that runs knex migrate:latest.

inputs:
  app:
    description: App name (auth | communication-service)
    required: true
  version:
    description: Docker image tag
    required: true
  owner:
    description: GitHub owner (lowercase)
    required: true
  run_id:
    description: GitHub run ID (used to make the Job name unique)
    required: true

runs:
  using: composite
  steps:
    - name: Create migration Job
      shell: bash
      env:
        APP:     ${{ inputs.app }}
        VERSION: ${{ inputs.version }}
        OWNER:   ${{ inputs.owner }}
        RUN_ID:  ${{ inputs.run_id }}
      run: |
        JOB_NAME="${APP}-migrate-${RUN_ID}"
        echo "Creating migration Job: ${JOB_NAME}"

        kubectl apply -f - <<EOF
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${JOB_NAME}
          namespace: gomin-apps
          labels:
            app: ${APP}
            component: migration
            version: "${VERSION}"
        spec:
          backoffLimit: 0
          activeDeadlineSeconds: 300
          ttlSecondsAfterFinished: 600
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: migrate
                  image: ghcr.io/${OWNER}/gomin-${APP}:${VERSION}
                  command: ["sh", "-c"]
                  args: ["node_modules/.bin/knex migrate:latest --knexfile knexfile.js"]
                  envFrom:
                    - secretRef:
                        name: ${APP}-secret
        EOF

    - name: Wait for migration Job
      shell: bash
      env:
        APP:    ${{ inputs.app }}
        RUN_ID: ${{ inputs.run_id }}
      run: |
        JOB_NAME="${APP}-migrate-${RUN_ID}"
        echo "Waiting for migration to finish (timeout 5m)..."
        TIMEOUT=300
        ELAPSED=0
        INTERVAL=5

        while [ $ELAPSED -lt $TIMEOUT ]; do
          COMPLETE=$(kubectl get job/${JOB_NAME} -n gomin-apps \
            -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)
          FAILED=$(kubectl get job/${JOB_NAME} -n gomin-apps \
            -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)

          if [ "$COMPLETE" = "True" ]; then
            echo "Migration succeeded for ${APP}"
            exit 0
          fi

          if [ "$FAILED" = "True" ]; then
            echo "::error::Migration failed for ${APP}"
            kubectl logs job/${JOB_NAME} -n gomin-apps --tail=100 || true
            exit 1
          fi

          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
        done

        echo "::error::Migration timed out after ${TIMEOUT}s for ${APP}"
        kubectl logs job/${JOB_NAME} -n gomin-apps --tail=100 || true
        exit 1
