name: Web — Build & Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Image tag (e.g. v1.2.3). Leave empty to use package.json "version"
          (with v prefix). Falls back to v0.1.0.
        required: false
        default: ''
      vite_api_url:
        description: 'VITE_API_URL baked into the bundle'
        required: false
        default: 'http://api.84.247.133.45.nip.io/api'
      vite_ws_url:
        description: 'VITE_WS_URL baked into the bundle'
        required: false
        default: 'http://api.84.247.133.45.nip.io'
      deploy:
        description: 'Deploy to Kubernetes'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Resolve version & owner ─────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      resolved_version: ${{ steps.resolve.outputs.resolved_version }}
      owner:            ${{ steps.resolve.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          FALLBACK='v0.1.0'
          PKG_RAW=$(jq -r '.version // empty' package.json 2>/dev/null || true)
          if [ -z "$PKG_RAW" ] || [ "$PKG_RAW" = "null" ]; then PKG_RAW=''; fi

          if [ -n "$INPUT_VERSION" ]; then
            RESOLVED="$INPUT_VERSION"
          elif [ -n "$PKG_RAW" ]; then
            case "$PKG_RAW" in v*) RESOLVED="$PKG_RAW" ;; *) RESOLVED="v${PKG_RAW}" ;; esac
          else
            RESOLVED="$FALLBACK"
          fi

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "resolved_version=${RESOLVED}" >> "$GITHUB_OUTPUT"
          echo "owner=${OWNER}"               >> "$GITHUB_OUTPUT"
          echo "Tag: ${RESOLVED}, Owner: ${OWNER}"

  # ── 2. Build & push web image ──────────────────────────────────────────────
  build:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — web
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ inputs.vite_api_url }}
            VITE_WS_URL=${{ inputs.vite_ws_url }}
          tags: |
            ghcr.io/${{ needs.setup.outputs.owner }}/gomin-web:${{ needs.setup.outputs.resolved_version }}
            ghcr.io/${{ needs.setup.outputs.owner }}/gomin-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── 3. Helm deploy (optional) ─────────────────────────────────────────────
  deploy:
    needs: [setup, build]
    if: ${{ inputs.deploy == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade — web
        env:
          VERSION: ${{ needs.setup.outputs.resolved_version }}
          OWNER:   ${{ needs.setup.outputs.owner }}
        run: |
          DEPLOYED=$(helm history "web" --namespace gomin-apps -o json 2>/dev/null \
            | jq '[.[] | select(.status=="deployed")] | length' 2>/dev/null || echo "0")
          if [ "$DEPLOYED" = "0" ]; then
            echo "No deployed revision — uninstalling before fresh deploy"
            helm uninstall "web" --namespace gomin-apps --ignore-not-found --wait
          fi

          helm upgrade --install "web" "./charts/web" \
            --namespace gomin-apps \
            --set image.repository="ghcr.io/${OWNER}/gomin-web" \
            --set image.tag="${VERSION}" \
            --cleanup-on-fail \
            --timeout 5m
