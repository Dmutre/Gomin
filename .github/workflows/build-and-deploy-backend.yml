name: Backend — Build & Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Image tag (e.g. v1.2.3). Leave empty to use package.json "version"
          (with v prefix). Falls back to v0.1.0.
        required: false
        default: ''
      run_migrations:
        description: 'Run DB migrations (auth, communication-service)'
        type: boolean
        default: false
      deploy:
        description: 'Deploy to Kubernetes'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Resolve version & owner ─────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      resolved_version: ${{ steps.resolve.outputs.resolved_version }}
      owner:            ${{ steps.resolve.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          FALLBACK='v0.1.0'
          PKG_RAW=$(jq -r '.version // empty' package.json 2>/dev/null || true)
          if [ -z "$PKG_RAW" ] || [ "$PKG_RAW" = "null" ]; then PKG_RAW=''; fi

          if [ -n "$INPUT_VERSION" ]; then
            RESOLVED="$INPUT_VERSION"
          elif [ -n "$PKG_RAW" ]; then
            case "$PKG_RAW" in v*) RESOLVED="$PKG_RAW" ;; *) RESOLVED="v${PKG_RAW}" ;; esac
          else
            RESOLVED="$FALLBACK"
          fi

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "resolved_version=${RESOLVED}" >> "$GITHUB_OUTPUT"
          echo "owner=${OWNER}"               >> "$GITHUB_OUTPUT"
          echo "Tag: ${RESOLVED}, Owner: ${OWNER}"

  # ── 2. Build & push all backend images ────────────────────────────────────
  build:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api-gateway, auth, communication-service]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ needs.setup.outputs.owner }}/gomin-${{ matrix.app }}:${{ needs.setup.outputs.resolved_version }}
            ghcr.io/${{ needs.setup.outputs.owner }}/gomin-${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ── 3. DB migrations (optional) ───────────────────────────────────────────
  migrate:
    needs: [setup, build]
    if: ${{ inputs.run_migrations == true }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [auth, communication-service]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Migrate — ${{ matrix.app }}
        env:
          APP:     ${{ matrix.app }}
          VERSION: ${{ needs.setup.outputs.resolved_version }}
          OWNER:   ${{ needs.setup.outputs.owner }}
          RUN_ID:  ${{ github.run_id }}
        run: |
          JOB_NAME="${APP}-migrate-${RUN_ID}"
          echo "Creating migration Job: ${JOB_NAME}"

          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: gomin-apps
            labels:
              app: ${APP}
              component: migration
              version: "${VERSION}"
          spec:
            backoffLimit: 0
            activeDeadlineSeconds: 300
            ttlSecondsAfterFinished: 600
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: ghcr.io/${OWNER}/gomin-${APP}:${VERSION}
                    command: ["sh", "-c"]
                    args: ["node_modules/.bin/knex migrate:latest --knexfile knexfile.js"]
                    envFrom:
                      - secretRef:
                          name: ${APP}-secret
          EOF

          echo "Waiting for migration (timeout 5m)..."
          TIMEOUT=300; ELAPSED=0; INTERVAL=5
          while [ $ELAPSED -lt $TIMEOUT ]; do
            COMPLETE=$(kubectl get job/${JOB_NAME} -n gomin-apps \
              -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)
            FAILED=$(kubectl get job/${JOB_NAME} -n gomin-apps \
              -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)
            if [ "$COMPLETE" = "True" ]; then echo "Migration succeeded for ${APP}"; exit 0; fi
            if [ "$FAILED"   = "True" ]; then
              echo "::error::Migration failed for ${APP}"
              kubectl logs job/${JOB_NAME} -n gomin-apps --tail=100 || true
              exit 1
            fi
            sleep $INTERVAL; ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "::error::Migration timed out for ${APP}"
          kubectl logs job/${JOB_NAME} -n gomin-apps --tail=100 || true
          exit 1

  # ── 4. Helm deploy (optional) ─────────────────────────────────────────────
  deploy:
    needs: [setup, build, migrate]
    if: >-
      ${{ always() &&
          needs.setup.result == 'success' &&
          needs.build.result == 'success' &&
          (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
          inputs.deploy == true }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api-gateway, auth, communication-service]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade — ${{ matrix.app }}
        env:
          APP:     ${{ matrix.app }}
          VERSION: ${{ needs.setup.outputs.resolved_version }}
          OWNER:   ${{ needs.setup.outputs.owner }}
        run: |
          DEPLOYED=$(helm history "${APP}" --namespace gomin-apps -o json 2>/dev/null \
            | jq '[.[] | select(.status=="deployed")] | length' 2>/dev/null || echo "0")
          if [ "$DEPLOYED" = "0" ]; then
            echo "No deployed revision — uninstalling before fresh deploy"
            helm uninstall "${APP}" --namespace gomin-apps --ignore-not-found --wait
          fi

          helm upgrade --install "${APP}" "./charts/${APP}" \
            --namespace gomin-apps \
            --set image.repository="ghcr.io/${OWNER}/gomin-${APP}" \
            --set image.tag="${VERSION}" \
            --set migrations.enabled=false \
            --cleanup-on-fail \
            --timeout 5m
