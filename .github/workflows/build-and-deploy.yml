name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Image tag (e.g. v1.2.3). Leave empty to use package.json "version"
          (with v prefix if missing). If package.json has no version, falls back to v0.1.0.
        required: false
        default: ''
      build_api_gateway:
        description: 'Build api-gateway'
        type: boolean
        default: true
      build_auth:
        description: 'Build auth'
        type: boolean
        default: true
      build_communication_service:
        description: 'Build communication-service'
        type: boolean
        default: true
      run_migrations:
        description: 'Run DB migrations (auth, communication-service)'
        type: boolean
        default: false
      deploy:
        description: 'Deploy to Kubernetes'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Compute matrices ────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      build_matrix:     ${{ steps.matrix.outputs.build_matrix }}
      has_builds:       ${{ steps.matrix.outputs.has_builds }}
      deploy_matrix:    ${{ steps.matrix.outputs.deploy_matrix }}
      migrate_matrix:   ${{ steps.matrix.outputs.migrate_matrix }}
      has_migrations:   ${{ steps.matrix.outputs.has_migrations }}
      owner:            ${{ steps.matrix.outputs.owner }}
      resolved_version: ${{ steps.matrix.outputs.resolved_version }}
    steps:
      - uses: actions/checkout@v4

      - id: matrix
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          FALLBACK='v0.1.0'
          PKG_RAW=$(jq -r '.version // empty' package.json 2>/dev/null || true)
          if [ -z "$PKG_RAW" ] || [ "$PKG_RAW" = "null" ]; then PKG_RAW=''; fi

          if [ -n "$INPUT_VERSION" ]; then
            RESOLVED="$INPUT_VERSION"
          elif [ -n "$PKG_RAW" ]; then
            case "$PKG_RAW" in
              v*) RESOLVED="$PKG_RAW" ;;
              *)  RESOLVED="v${PKG_RAW}" ;;
            esac
          else
            RESOLVED="$FALLBACK"
          fi

          echo "resolved_version=${RESOLVED}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${RESOLVED}"

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"

          # ── Apps to BUILD (only explicitly checked) ──
          build_apps='[]'
          [ "${{ inputs.build_api_gateway }}"           = "true" ] && build_apps=$(echo "$build_apps" | jq -c '. += [{"app":"api-gateway"}]')
          [ "${{ inputs.build_auth }}"                  = "true" ] && build_apps=$(echo "$build_apps" | jq -c '. += [{"app":"auth"}]')
          [ "${{ inputs.build_communication_service }}" = "true" ] && build_apps=$(echo "$build_apps" | jq -c '. += [{"app":"communication-service"}]')

          if [ "$build_apps" = "[]" ]; then
            echo "has_builds=false" >> "$GITHUB_OUTPUT"
            echo "build_matrix={\"include\":[{\"app\":\"_none\"}]}" >> "$GITHUB_OUTPUT"
          else
            echo "has_builds=true" >> "$GITHUB_OUTPUT"
            echo "build_matrix={\"include\":$build_apps}" >> "$GITHUB_OUTPUT"
          fi

          # ── Apps to DEPLOY/MIGRATE: checked ones, or all three if none checked ──
          if [ "$build_apps" != "[]" ]; then
            deploy_apps="$build_apps"
          else
            deploy_apps='[{"app":"api-gateway"},{"app":"auth"},{"app":"communication-service"}]'
          fi
          echo "deploy_matrix={\"include\":$deploy_apps}" >> "$GITHUB_OUTPUT"

          # ── Migration-capable apps among deploy targets ──
          migrate_apps='[]'
          echo "$deploy_apps" | jq -e '.[] | select(.app == "auth")' > /dev/null 2>&1 \
            && migrate_apps=$(echo "$migrate_apps" | jq -c '. += [{"app":"auth"}]')
          echo "$deploy_apps" | jq -e '.[] | select(.app == "communication-service")' > /dev/null 2>&1 \
            && migrate_apps=$(echo "$migrate_apps" | jq -c '. += [{"app":"communication-service"}]')

          if [ "$migrate_apps" = "[]" ]; then
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
            echo "migrate_matrix={\"include\":[{\"app\":\"_none\"}]}" >> "$GITHUB_OUTPUT"
          else
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
            echo "migrate_matrix={\"include\":$migrate_apps}" >> "$GITHUB_OUTPUT"
          fi

          echo "Owner:          ${OWNER}"
          echo "Build matrix:   $build_apps"
          echo "Deploy matrix:  $deploy_apps"
          echo "Migrate matrix: $migrate_apps"

  # ── 2. Build & push Docker images (skipped if no apps checked) ────────────
  build:
    needs: setup
    if: ${{ needs.setup.outputs.has_builds == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.build_matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ needs.setup.outputs.owner }}/gomin-${{ matrix.app }}:${{ needs.setup.outputs.resolved_version }}
            ghcr.io/${{ needs.setup.outputs.owner }}/gomin-${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ── 3. Run DB migrations (optional) ───────────────────────────────────────
  migrate:
    needs: [setup, build]
    if: >-
      ${{ always() &&
          needs.setup.result == 'success' &&
          (needs.build.result == 'success' || needs.build.result == 'skipped') &&
          inputs.run_migrations == true &&
          needs.setup.outputs.has_migrations == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.migrate_matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Migrate — ${{ matrix.app }}
        uses: ./.github/actions/run-migration
        with:
          app:     ${{ matrix.app }}
          version: ${{ needs.setup.outputs.resolved_version }}
          owner:   ${{ needs.setup.outputs.owner }}
          run_id:  ${{ github.run_id }}

  # ── 4. Helm upgrade (optional) ────────────────────────────────────────────
  deploy:
    needs: [setup, build, migrate]
    if: >-
      ${{ always() &&
          needs.setup.result == 'success' &&
          (needs.build.result == 'success' || needs.build.result == 'skipped') &&
          (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
          inputs.deploy == true }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.deploy_matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade — ${{ matrix.app }}
        env:
          APP:     ${{ matrix.app }}
          VERSION: ${{ needs.setup.outputs.resolved_version }}
          OWNER:   ${{ needs.setup.outputs.owner }}
        run: |
          # If no successful revision exists the release is in a broken state
          # (e.g. first install failed). Uninstall so helm can start clean.
          DEPLOYED=$(helm history "${APP}" --namespace gomin-apps -o json 2>/dev/null \
            | jq '[.[] | select(.status=="deployed")] | length' 2>/dev/null || echo "0")
          if [ "$DEPLOYED" = "0" ]; then
            echo "No deployed revision for ${APP} — uninstalling before fresh deploy"
            helm uninstall "${APP}" --namespace gomin-apps --ignore-not-found --wait
          fi

          # migrations.enabled=false — CI runs migrations explicitly via the
          # migrate job above; skip the Helm hook to avoid running them twice.
          helm upgrade --install "${APP}" "./charts/${APP}" \
            --namespace gomin-apps \
            --set image.repository="ghcr.io/${OWNER}/gomin-${APP}" \
            --set image.tag="${VERSION}" \
            --set migrations.enabled=false \
            --cleanup-on-fail \
            --timeout 5m
