name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Image tag (e.g. v1.2.3). Leave empty to use package.json "version"
          (with v prefix if missing). If package.json has no version, falls back to v0.1.0.
        required: false
        default: ''

      # ── App selection (applies to all checked operations) ──────────────────
      api_gateway:
        description: 'Include api-gateway'
        type: boolean
        default: true
      auth:
        description: 'Include auth'
        type: boolean
        default: true
      communication_service:
        description: 'Include communication-service'
        type: boolean
        default: true

      # ── Operations ──────────────────────────────────────────────────────────
      build:
        description: 'Build & push Docker images'
        type: boolean
        default: true
      run_migrations:
        description: 'Run DB migrations (auth, communication-service)'
        type: boolean
        default: false
      deploy:
        description: 'Deploy to Kubernetes'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Compute matrices ────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix:           ${{ steps.matrix.outputs.matrix }}
      migrate_matrix:   ${{ steps.matrix.outputs.migrate_matrix }}
      has_migrations:   ${{ steps.matrix.outputs.has_migrations }}
      has_apps:         ${{ steps.matrix.outputs.has_apps }}
      owner:            ${{ steps.matrix.outputs.owner }}
      resolved_version: ${{ steps.matrix.outputs.resolved_version }}
    steps:
      - uses: actions/checkout@v4

      - id: matrix
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          FALLBACK='v0.1.0'
          PKG_RAW=$(jq -r '.version // empty' package.json 2>/dev/null || true)
          if [ -z "$PKG_RAW" ] || [ "$PKG_RAW" = "null" ]; then PKG_RAW=''; fi

          if [ -n "$INPUT_VERSION" ]; then
            RESOLVED="$INPUT_VERSION"
          elif [ -n "$PKG_RAW" ]; then
            case "$PKG_RAW" in
              v*) RESOLVED="$PKG_RAW" ;;
              *)  RESOLVED="v${PKG_RAW}" ;;
            esac
          else
            RESOLVED="$FALLBACK"
          fi

          echo "resolved_version=${RESOLVED}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${RESOLVED}"

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"

          # ── Selected apps matrix ──
          apps='[]'
          [ "${{ inputs.api_gateway }}"           = "true" ] && apps=$(echo "$apps" | jq -c '. += [{"app":"api-gateway"}]')
          [ "${{ inputs.auth }}"                  = "true" ] && apps=$(echo "$apps" | jq -c '. += [{"app":"auth"}]')
          [ "${{ inputs.communication_service }}" = "true" ] && apps=$(echo "$apps" | jq -c '. += [{"app":"communication-service"}]')

          if [ "$apps" = "[]" ]; then
            echo "::error::No apps selected — enable at least one."
            exit 1
          fi

          echo "has_apps=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":$apps}" >> "$GITHUB_OUTPUT"

          # ── Migration-capable apps among selected ──
          migrate_apps='[]'
          [ "${{ inputs.auth }}"                  = "true" ] && migrate_apps=$(echo "$migrate_apps" | jq -c '. += [{"app":"auth"}]')
          [ "${{ inputs.communication_service }}" = "true" ] && migrate_apps=$(echo "$migrate_apps" | jq -c '. += [{"app":"communication-service"}]')

          if [ "$migrate_apps" = "[]" ]; then
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
            echo "migrate_matrix={\"include\":[{\"app\":\"_none\"}]}" >> "$GITHUB_OUTPUT"
          else
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
            echo "migrate_matrix={\"include\":$migrate_apps}" >> "$GITHUB_OUTPUT"
          fi

          echo "Owner:          ${OWNER}"
          echo "Apps matrix:    $apps"
          echo "Migrate matrix: $migrate_apps"

  # ── 2. Build & push Docker images (optional) ──────────────────────────────
  build:
    needs: setup
    if: ${{ inputs.build == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ needs.setup.outputs.owner }}/gomin-${{ matrix.app }}:${{ needs.setup.outputs.resolved_version }}
            ghcr.io/${{ needs.setup.outputs.owner }}/gomin-${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ── 3. Run DB migrations (optional) ───────────────────────────────────────
  migrate:
    needs: [setup, build]
    if: >-
      ${{ always() &&
          needs.setup.result == 'success' &&
          (needs.build.result == 'success' || needs.build.result == 'skipped') &&
          inputs.run_migrations == true &&
          needs.setup.outputs.has_migrations == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.migrate_matrix) }}
      fail-fast: false
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Migrate — ${{ matrix.app }}
        env:
          APP:     ${{ matrix.app }}
          VERSION: ${{ needs.setup.outputs.resolved_version }}
          OWNER:   ${{ needs.setup.outputs.owner }}
          RUN_ID:  ${{ github.run_id }}
        run: |
          JOB_NAME="${APP}-migrate-${RUN_ID}"
          echo "Creating migration Job: ${JOB_NAME}"

          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: gomin-apps
            labels:
              app: ${APP}
              component: migration
              version: "${VERSION}"
          spec:
            backoffLimit: 0
            activeDeadlineSeconds: 300
            ttlSecondsAfterFinished: 600
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: ghcr.io/${OWNER}/gomin-${APP}:${VERSION}
                    command:
                      - node_modules/.bin/knex
                      - migrate:latest
                      - --knexfile
                      - knexfile.js
                    envFrom:
                      - secretRef:
                          name: ${APP}-secret
          EOF

          echo "Waiting for migration to finish (timeout 5m)..."
          TIMEOUT=300
          ELAPSED=0
          INTERVAL=5

          while [ $ELAPSED -lt $TIMEOUT ]; do
            COMPLETE=$(kubectl get job/${JOB_NAME} -n gomin-apps \
              -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)
            FAILED=$(kubectl get job/${JOB_NAME} -n gomin-apps \
              -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)

            if [ "$COMPLETE" = "True" ]; then
              echo "Migration succeeded for ${APP}"
              exit 0
            fi

            if [ "$FAILED" = "True" ]; then
              echo "::error::Migration failed for ${APP}"
              echo "--- Migration logs ---"
              kubectl logs job/${JOB_NAME} -n gomin-apps --tail=100 || true
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::Migration timed out after ${TIMEOUT}s for ${APP}"
          kubectl logs job/${JOB_NAME} -n gomin-apps --tail=100 || true
          exit 1

  # ── 4. Helm upgrade (optional) ────────────────────────────────────────────
  deploy:
    needs: [setup, build, migrate]
    if: >-
      ${{ always() &&
          needs.setup.result == 'success' &&
          (needs.build.result == 'success' || needs.build.result == 'skipped') &&
          (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
          inputs.deploy == true }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade — ${{ matrix.app }}
        env:
          APP:     ${{ matrix.app }}
          VERSION: ${{ needs.setup.outputs.resolved_version }}
          OWNER:   ${{ needs.setup.outputs.owner }}
        run: |
          # If the release is in a broken state (failed/pending with no successful
          # deploy), uninstall it so helm upgrade --install starts clean.
          STATUS=$(helm status "${APP}" --namespace gomin-apps -o json 2>/dev/null \
            | jq -r '.info.status' 2>/dev/null || echo "not-found")
          if [[ "$STATUS" == "failed" || "$STATUS" == "pending-install" || "$STATUS" == "pending-upgrade" ]]; then
            echo "Release ${APP} is in '${STATUS}' state — uninstalling before fresh deploy"
            helm uninstall "${APP}" --namespace gomin-apps --wait
          fi

          # migrations.enabled=false — CI runs migrations explicitly via the
          # migrate job above; skip the Helm hook to avoid running them twice.
          helm upgrade --install "${APP}" "./charts/${APP}" \
            --namespace gomin-apps \
            --set image.repository="ghcr.io/${OWNER}/gomin-${APP}" \
            --set image.tag="${VERSION}" \
            --set migrations.enabled=false \
            --rollback-on-failure \
            --timeout 5m
