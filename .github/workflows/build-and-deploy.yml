name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. v1.2.3)'
        required: true
        default: 'v0.1.0'
      build_api_gateway:
        description: 'Build api-gateway'
        type: boolean
        default: true
      build_auth:
        description: 'Build auth'
        type: boolean
        default: true
      build_communication_service:
        description: 'Build communication-service'
        type: boolean
        default: true
      deploy:
        description: 'Deploy to Kubernetes after build'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Compute matrix of selected apps ────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          apps='[]'
          [ "${{ inputs.build_api_gateway }}"           = "true" ] && apps=$(echo "$apps" | jq '. += [{"app":"api-gateway"}]')
          [ "${{ inputs.build_auth }}"                  = "true" ] && apps=$(echo "$apps" | jq '. += [{"app":"auth"}]')
          [ "${{ inputs.build_communication_service }}" = "true" ] && apps=$(echo "$apps" | jq '. += [{"app":"communication-service"}]')

          if [ "$apps" = "[]" ]; then
            echo "::error::No apps selected — enable at least one checkbox."
            exit 1
          fi

          matrix="{\"include\":$apps}"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Selected apps: $apps"

  # ── 2. Build & push Docker images ─────────────────────────────────────────
  build:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gomin-${{ matrix.app }}:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/gomin-${{ matrix.app }}:latest
          # Layer cache per app — dramatically speeds up subsequent builds
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ── 3. Helm upgrade on Kubernetes ─────────────────────────────────────────
  deploy:
    needs: [setup, build]
    if: ${{ inputs.deploy == true }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      # Secret KUBECONFIG must be added in repo Settings → Secrets → Actions.
      # Content: base64-encoded or raw kubeconfig file from your VDS cluster.
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade — ${{ matrix.app }}
        run: |
          helm upgrade --install ${{ matrix.app }} ./charts/${{ matrix.app }} \
            --namespace gomin-apps \
            --create-namespace \
            --set image.repository=ghcr.io/${{ github.repository_owner }}/gomin-${{ matrix.app }} \
            --set image.tag=${{ inputs.version }} \
            --atomic \
            --timeout 5m
