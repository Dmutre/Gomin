name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      deploy_linkerd:
        description: 'Install / upgrade Linkerd service mesh'
        type: boolean
        default: false
      deploy_redis:
        description: 'Deploy Redis'
        type: boolean
        default: false
      deploy_minio:
        description: 'Deploy MinIO'
        type: boolean
        default: false
      deploy_monitoring:
        description: 'Deploy monitoring stack (Prometheus + Grafana)'
        type: boolean
        default: false

jobs:
  # ── 0. Linkerd service mesh ──────────────────────────────────────────────────
  deploy-linkerd:
    name: Install Linkerd
    if: ${{ inputs.deploy_linkerd }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Linkerd CLI
        run: |
          curl --proto '=https' --tlsv1.2 -sSfL https://run.linkerd.io/install | sh
          echo "$HOME/.linkerd2/bin" >> $GITHUB_PATH

      - name: Install Linkerd CRDs
        run: linkerd install --crds | kubectl apply -f -

      - name: Install Linkerd control plane
        run: linkerd install | kubectl apply -f -

      - name: Wait for control plane
        run: linkerd check

      - name: Show Linkerd pods
        if: always()
        run: kubectl get pods -n linkerd

  # ── 1. Redis + MinIO (gomin-infra chart) ────────────────────────────────────
  deploy-infra:
    name: Deploy Redis / MinIO
    if: ${{ inputs.deploy_redis || inputs.deploy_minio }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade — gomin-infra
        run: |
          DEPLOYED=$(helm history gomin-infra --namespace gomin-infra -o json 2>/dev/null \
            | jq '[.[] | select(.status=="deployed")] | length' 2>/dev/null || echo "0")
          if [ "$DEPLOYED" = "0" ]; then
            echo "No deployed revision — uninstalling before fresh deploy"
            helm uninstall gomin-infra --namespace gomin-infra --ignore-not-found --wait
          fi

          helm upgrade --install gomin-infra ./charts/infra \
            --namespace gomin-infra \
            --set redis.enabled=${{ inputs.deploy_redis }} \
            --set minio.enabled=${{ inputs.deploy_minio }} \
            --cleanup-on-fail \
            --timeout 5m

      - name: Show pod status
        if: always()
        run: kubectl get pods -n gomin-infra

  # ── 2. Monitoring stack (Prometheus + Loki + Tempo + Grafana + OTel) ─────────
  deploy-monitoring:
    name: Deploy Monitoring Stack
    if: ${{ inputs.deploy_monitoring }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update

      - name: Resolve chart dependencies
        run: helm dependency update charts/monitoring

      - name: Helm upgrade — monitoring stack
        run: |
          helm upgrade --install monitoring ./charts/monitoring \
            --namespace gomin-monitoring \
            --set kube-prometheus-stack.grafana.adminPassword="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --cleanup-on-fail \
            --timeout 5m

      - name: Show pod status
        if: always()
        run: kubectl get pods -n gomin-monitoring
