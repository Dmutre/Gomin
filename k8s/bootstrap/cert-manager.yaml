# Applied once after cert-manager Helm chart is deployed (see deploy-infra workflow).
# Creates a Let's Encrypt production ClusterIssuer using HTTP-01 via Traefik.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dmytro.lesko@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
