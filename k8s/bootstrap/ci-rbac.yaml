---
# Bootstrap file — safe to apply on a bare cluster.
# Creates namespaces first, then the ServiceAccount and RBAC for GitHub Actions.
apiVersion: v1
kind: Namespace
metadata:
  name: gomin-apps
  labels:
    gomin/namespace-type: apps

---
apiVersion: v1
kind: Namespace
metadata:
  name: gomin-infra
  labels:
    gomin/namespace-type: infra

---
# ServiceAccount used exclusively by GitHub Actions CI/CD.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions
  namespace: gomin-apps

---
# Minimum permissions Helm needs to manage releases inside a namespace:
# - Secrets: Helm stores release state as Secrets
# - Jobs: migration jobs (create, wait, delete)
# - Everything else: chart resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gomin-deployer
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "pods",
                "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# Bind to gomin-apps
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: gomin-apps
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: gomin-apps
roleRef:
  kind: ClusterRole
  name: gomin-deployer
  apiGroup: rbac.authorization.k8s.io

---
# Bind to gomin-infra (for infra deployments)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: gomin-infra
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: gomin-apps
roleRef:
  kind: ClusterRole
  name: gomin-deployer
  apiGroup: rbac.authorization.k8s.io

---
# Kubernetes 1.24+ no longer auto-creates ServiceAccount tokens.
# This Secret creates a long-lived token bound to the ServiceAccount.
apiVersion: v1
kind: Secret
metadata:
  name: github-actions-token
  namespace: gomin-apps
  annotations:
    kubernetes.io/service-account.name: github-actions
type: kubernetes.io/service-account-token
