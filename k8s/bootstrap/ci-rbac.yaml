---
# Bootstrap file — safe to apply on a bare cluster.
# Creates namespaces first, then the ServiceAccount and RBAC for GitHub Actions.
apiVersion: v1
kind: Namespace
metadata:
  name: gomin-apps
  labels:
    gomin/namespace-type: apps

---
apiVersion: v1
kind: Namespace
metadata:
  name: gomin-infra
  labels:
    gomin/namespace-type: infra

---
# Required by Linkerd viz tap component (not present on k3s by default).
# Must be a Role (not ClusterRole) — Linkerd viz install creates a RoleBinding
# referencing this as kind: Role in kube-system.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: extension-apiserver-authentication-reader
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["extension-apiserver-authentication"]
    verbs: ["get", "list", "watch"]

---
# ServiceAccount used exclusively by GitHub Actions CI/CD.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions
  namespace: gomin-apps

---
# Minimum permissions Helm needs to manage releases inside a namespace:
# - Secrets: Helm stores release state as Secrets
# - Jobs: migration jobs (create, wait, delete)
# - Everything else: chart resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gomin-deployer
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "pods",
                "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Prometheus Operator CRDs (all namespace-scoped)
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - prometheuses
      - prometheusagents
      - prometheusrules
      - servicemonitors
      - podmonitors
      - probes
      - scrapeconfigs
      - alertmanagers
      - alertmanagerconfigs
      - thanosrulers
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Prometheus Operator leader-election leases
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# Bind to gomin-apps
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: gomin-apps
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: gomin-apps
roleRef:
  kind: ClusterRole
  name: gomin-deployer
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: Namespace
metadata:
  name: gomin-monitoring
  labels:
    gomin/namespace-type: monitoring

---
# Bind to gomin-infra (for infra deployments)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: gomin-infra
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: gomin-apps
roleRef:
  kind: ClusterRole
  name: gomin-deployer
  apiGroup: rbac.authorization.k8s.io

---
# Bind to gomin-monitoring (for monitoring stack deployments)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: gomin-monitoring
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: gomin-apps
roleRef:
  kind: ClusterRole
  name: gomin-deployer
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: Namespace
metadata:
  name: linkerd

---
# Bind to linkerd (for Linkerd control plane installation)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: linkerd
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: gomin-apps
roleRef:
  kind: ClusterRole
  name: gomin-deployer
  apiGroup: rbac.authorization.k8s.io

---
# Linkerd viz needs to create a RoleBinding in kube-system
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: kube-system
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: gomin-apps
roleRef:
  kind: ClusterRole
  name: gomin-deployer
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gomin-crd-manager
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "escalate", "bind"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - nodes/proxy
      - namespaces
      - persistentvolumes
      - configmaps
      - secrets
      - endpoints
      - services
      - services/finalizers
      - pods
      - pods/log
      - replicationcontrollers
      - resourcequotas
      - limitranges
      - serviceaccounts
      - events
      - persistentvolumeclaims
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["*"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["*"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["*"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["*"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["*"]
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["*"]
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - "*"
      - "*/finalizers"
      - "*/status"
    verbs: ["*"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
  # Linkerd installation — SA must hold these to create Linkerd's ClusterRoles
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["linkerd.io"]
    resources: ["*", "*/status", "*/finalizers"]
    verbs: ["*"]
  - apiGroups: ["workload.linkerd.io"]
    resources: ["*", "*/status", "*/finalizers"]
    verbs: ["*"]
  - apiGroups: ["policy.linkerd.io"]
    resources: ["*", "*/status", "*/finalizers"]
    verbs: ["*"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["*", "*/status", "*/finalizers"]
    verbs: ["*"]
  - apiGroups: ["extensions"]
    resources: ["deployments", "daemonsets", "replicasets", "statefulsets", "jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apiregistration.k8s.io"]
    resources: ["apiservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-actions-crd-manager
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: gomin-apps
roleRef:
  kind: ClusterRole
  name: gomin-crd-manager
  apiGroup: rbac.authorization.k8s.io

---
# Kubernetes 1.24+ no longer auto-creates ServiceAccount tokens.
# This Secret creates a long-lived token bound to the ServiceAccount.
apiVersion: v1
kind: Secret
metadata:
  name: github-actions-token
  namespace: gomin-apps
  annotations:
    kubernetes.io/service-account.name: github-actions
type: kubernetes.io/service-account-token
